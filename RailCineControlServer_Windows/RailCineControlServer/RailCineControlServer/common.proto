syntax = "proto3";

package ServerApi;

// =========================================================================================
// 协议格式 [TotalLen (4字节)] + [HeaderLen (2字节)] + [PacketHeader 字节流] + [Body 字节流]
// =========================================================================================

// =========================================================================================
// 全局路由与状态枚举
// =========================================================================================

// 定义消息ID
enum MsgId {
    ID_NONE        = 0;
    ID_LOGIN_REQ   = 1001;                                                      // 登录请求
    ID_LOGIN_RSP   = 1002;                                                      // 登录响应
    ID_HEARTBEAT   = 1003;                                                      // 心跳包
}

// 定义全局错误码
enum ErrorCode {
    ERR_SUCCESS         = 0;                                                    // 登录/操作成功
    ERR_SERVER_INTERNAL = 1;                                                    // 服务器内部错误
    ERR_WRONG_PWD       = 2;                                                    // 账号不存在或密码错误
    ERR_ACCOUNT_IN_USE  = 3;                                                    // 账号已在其他机器登录 (防多开)
    ERR_ACCOUNT_EXPIRED = 4;                                                    // 账号授权已过期
}

// =========================================================================================
// 核心通信包头
// =========================================================================================
message PacketHeader {
    MsgId     msg_id     = 1;                                                   // 【核心】消息ID路由
    uint64    seq_id     = 2;                                                   // 【复用】请求序列号
    ErrorCode error_code = 3;                                                   // 【状态】0为成功，非0为错误
    string    error_msg  = 4;                                                   // 【提示】错误时的具体文本，直接用来弹窗
}