syntax = "proto3";

package ServerApi;

// =========================================================================================
// 1. 登录业务
// =========================================================================================
message LoginReq {
    string username = 1;                                                        // 厂家后台分配的账号
    string password = 2;                                                        // 登录密码 (建议客户端做个MD5后再传)
}

message LoginRsp {
    // 注意：鉴权结果看 Header 里的 error_code
    // 这里只放登录成功后，服务器下发的初始化数据
    int64  server_time  = 1;                                                    // 服务器同步时间
    string shop_name    = 2;                                                    // 可选：下发该账号绑定的门店名称，用于UI显示
}

// =========================================================================================
// 2. 心跳保活业务
// =========================================================================================
message Heartbeat {
    int64 timestamp = 1;                                                        // 客户端当前时间戳
}