syntax = "proto3";

package ServerApi;

// =========================================================================================
// 1. 登录业务
// =========================================================================================
message LoginReq {
    string username = 1;                                                        // 厂家后台分配的账号
    string password = 2;                                                        // 登录密码 (建议客户端做个MD5后再传)
}

message LoginRsp {
    // 注意：鉴权结果看 Header 里的 error_code
    // 这里只放登录成功后，服务器下发的初始化数据
    int64  server_time  = 1;                                                    // 服务器同步时间
    string shop_name    = 2;                                                    // 可选：下发该账号绑定的门店名称，用于UI显示
}

// =========================================================================================
// 2. 心跳保活业务
// =========================================================================================
message Heartbeat {
    int64 timestamp = 1;                                                        // 客户端当前时间戳
}

// ===================================================================
// 3. 影片管理业务协议
// ===================================================================

// --- 影片录入/上传 ---
message UploadMovieReq {
    string movie_name  = 1;                                                     // 影片名称
    string cover_url   = 2;                                                     // 海报 URL (本地相对路径或云端链接)
    string video_url   = 3;                                                     // 视频 URL (本地相对路径或云端链接)
    string description = 4;                                                     // 影片简介
    string file_md5    = 5;                                                     // 视频文件的 MD5 (极其重要：用于服务端秒传和防重校验)
}

message UploadMovieRsp {
    uint64 new_movie_id = 1;                                                    // 服务端成功入库后，返回新分配的影片唯一主键 ID
}

// --- 获取影片列表 ---
// 这里定义一个影片信息结构体，方便在列表中复用
message MovieInfo {
    uint64 movie_id    = 1;
    string movie_name  = 2;
    string cover_url   = 3;
    string video_url   = 4;
    int32  play_status = 5;                                                     // 播放状态：0空闲 1播放中
}

message GetMovieListReq {
    uint32 page_index = 1;                                                      // 预留给分页功能 (默认传 1)
    uint32 page_size  = 2;                                                      // 每页数量 (默认传 100)
}

message GetMovieListRsp {
    repeated MovieInfo movies = 1;                                              // repeated 相当于 C++ 里的 std::vector 或 QList，包含多个影片
}