syntax = "proto3";

package ServerApi;

// =========================================================================================
// 1. 登录与心跳保活业务
// =========================================================================================
message LoginReq {
    string username = 1;                                                        // 厂家后台分配的账号
    string password = 2;                                                        // 登录密码 (建议客户端做个MD5后再传)
}

message LoginRsp {
    int64  server_time = 1;                                                     // 服务器同步时间戳
    string shop_name   = 2;                                                     // 账号绑定的门店名称，用于UI显示
    int32  permission  = 3;                                                     // 权限：0=普通用户, 1=管理员 (👑 新增)
}

message Heartbeat {
    int64 timestamp = 1;                                                        // 客户端当前时间戳
}

// =========================================================================================
// 2. 纯 TCP 大文件分片上传业务 (The Chunk Engine)
// =========================================================================================

// 客户端 -> 服务端：发送视频切片
message UploadChunkReq {
    string file_md5     = 1;                                                    // 整个视频文件的 MD5 (让服务器知道这是哪个文件的切片)
    uint32 chunk_index  = 2;                                                    // 第几个分片 (例如: 0, 1, 2...)
    uint64 chunk_offset = 3;                                                    // 👑 核心：此分片在原文件里的字节偏移量 (解决乱序写入)
    bytes  chunk_data   = 4;                                                    // 真实的二进制流数据 (如 1MB 大小的 mp4 碎片)
    bool   is_last      = 5;                                                    // 标识是否是最后一块
}

// 服务端 -> 客户端：切片接收确认
message UploadChunkRsp {
    string file_md5     = 1;                                                    // 对应的文件 MD5
    uint32 chunk_index  = 2;                                                    // 告诉客户端：第 index 个分片我已经安全落盘
    bool   is_complete  = 3;                                                    // 整个文件是否拼接完成
}

// =========================================================================================
// 3. 影片元数据录入业务 (上传完视频后触发)
// =========================================================================================

// 客户端 -> 服务端：登记影片信息
message UploadMovieReq {
    string movie_name   = 1;                                                    // 影片名称
    string description  = 2;                                                    // 影片玩法说明/简介
    bytes  cover_data   = 3;                                                    // 👑 海报图片的完整二进制流 (直接通过 TCP 传)
    string cover_suffix = 4;                                                    // 海报后缀名 (如 ".jpg", ".png")
    string video_md5    = 5;                                                    // 刚才切片上传的视频 MD5，通知服务器进行数据库绑定
    string encrypt_key  = 6;                                                    // 客户端上传时生成的 XOR 加密密钥
    uint32 duration_sec = 7;                                                    // 视频总时长(秒)
}

// 服务端 -> 客户端：登记成功
message UploadMovieRsp {
    uint64 new_movie_id = 1;                                                    // 服务端成功入库后，返回新分配的影片全局唯一 ID
}

// =========================================================================================
// 4. 影片列表拉取业务
// =========================================================================================

// 影片数据结构 (List复用)
message MovieInfo {
    uint64 movie_id    = 1;                                                     // 影片 ID
    string movie_name  = 2;                                                     // 影片名称
    string cover_url   = 3;                                                     // 云端海报 HTTP 链接 (或者本地相对路径)
    int32  play_status = 4;                                                     // 播放状态：0空闲 1播放中
    string file_md5    = 5;                                                     // 用于底层 TCP 分片下载的唯一标识！
    uint64 file_size   = 6;                                                     // 用于客户端判定本地是否已下载完毕
    string encrypt_key = 7;                                                     // 服务器下发给客户端，用于播放前“瞬间解锁”的钥匙
}

// 客户端 -> 服务端：请求拉取列表
message GetMovieListReq {
    uint32 page_index = 1;                                                      // 分页：当前页码 (默认 1)
    uint32 page_size  = 2;                                                      // 分页：每页数量 (默认 100)
}

// 服务端 -> 客户端：返回列表数据
message GetMovieListRsp {
    repeated MovieInfo movies = 1;                                              // repeated 数组，包含多部影片信息
}

// ===================================================================
// 5. 纯 TCP 分片下载协议
// ===================================================================
// 客户端 -> 服务端：我要抽水！给我第 index 块数据
message DownloadChunkReq {
    string file_md5    = 1;
    uint32 chunk_index = 2;                                                     // 请求的切片序号 (0, 1, 2...)
}

// 服务端 -> 客户端：水来了！这是你要的数据
message DownloadChunkRsp {
    string file_md5    = 1;
    uint32 chunk_index = 2;
    bytes  chunk_data  = 3;                                                     // 视频的二进制数据 (比如 1MB 或 2MB)
    bool   is_last     = 4;                                                     // 是不是最后一块
}

// ===================================================================
// 6. 💡 海报下载协议
// ===================================================================
// 客户端 -> 服务端：给我这张海报！
message DownloadCoverReq {
    string file_md5 = 1;                                                        // 拿视频的 MD5 当钥匙去取海报
}

// 服务端 -> 客户端：海报来了！
message DownloadCoverRsp {
    string file_md5   = 1;
    string cover_name = 2;                                                      // 海报的真实全名 (例如 "a1b2_cover.png")
    bytes  cover_data = 3;                                                      // 图片的全部二进制数据
}


// =========================================================================================
// 7. 播放记录业务 (增、删、查)
// =========================================================================================

// 单条记录的数据结构
message PlayRecord {
    uint64 record_id     = 1;                                                   // 数据库主键 ID (删除时必须使用)
    string movie_name    = 2;                                                   // 影片名称
    string play_date     = 3;                                                   // 播放日期 (如: "2026-04-08")
    string start_time    = 4;                                                   // 开始时间 (如: "14:00:00")
    string end_time      = 5;                                                   // 结束时间 (如: "15:30:00")
    string operator_name = 6;                                                   // 操作员
    string end_type      = 7;                                                   // 结束类型 (正常/强制)
}

// ➕ [增] 添加记录
message AddRecordReq {
    PlayRecord record = 1; 
}
message AddRecordRsp {
    uint64 new_record_id = 1;                                                   // 返回服务器生成的 ID
}

// 🔍 [查] 查询记录
message GetRecordsReq {
    string target_date = 1;                                                     // 如果为空则查询所有，如果不为空(如"2026-04-08")则查询当天
    uint32 page_index  = 2;                                                     // 分页
    uint32 page_size   = 3;
}
message GetRecordsRsp {
    repeated PlayRecord records = 1;
    uint32 total_count          = 2;
}

// 🗑️ [删] 删除记录
message DeleteRecordReq {
    uint64 record_id = 1;                                                       // 根据数据库主键精准删除
}
message DeleteRecordRsp {
    uint64 deleted_id = 1;
}


// =========================================================================================
// 8. 游戏库业务 (复用 TCP 分片上传/下载底层引擎)
// =========================================================================================

// 基础游戏数据结构 (用于列表展示和本地运行配置)
message GameInfo {
    uint64 game_id      = 1;                                                    // 游戏 ID
    string game_name    = 2;                                                    // 游戏名称
    string version      = 3;                                                    // 当前版本号 (例: "v1.0.5")
    string cover_url    = 4;                                                    // 海报存放路径或直链
    string package_md5  = 5;                                                    // 压缩包的 MD5，用于请求 TCP 分片下载
    uint64 package_size = 6;                                                    // 压缩包总大小 (用于进度条)
    string exe_path     = 7;                                                    // 相对启动路径 (解压后直接拼装运行)
    string description  = 8;                                                    // 游戏玩法介绍
}

// ---------------------------------------------------------
// [管理员端] 登记新游戏/更新游戏 (上传完 .tar 压缩包后调用)
// ---------------------------------------------------------
message UploadGameReq {
    string game_name    = 1;
    string version      = 2;                                                    
    string description  = 3;
    bytes  cover_data   = 4;                                                    // 海报图片的二进制流 (走 TCP 直传)
    string cover_suffix = 5;                                                    // 海报后缀 (如 ".jpg")
    string package_md5  = 6;                                                    // 刚才用 TCP 传完的压缩包的 MD5，通知服务器绑定关联
    string exe_path     = 7;                                                    // 填写的相对启动路径
}

message UploadGameRsp {
    uint64 game_id = 1;                                                         // 返回成功入库/更新后的游戏 ID
}

// ---------------------------------------------------------
// [客户端] 分页拉取游戏列表
// ---------------------------------------------------------
message GetGameListReq {
    uint32 page_index = 1;                                                      // 页码 (从 1 开始)
    uint32 page_size  = 2;                                                      // 每页数量
}

message GetGameListRsp {
    repeated GameInfo games = 1;                                                // 游戏列表数组
    uint32 total_count      = 2;                                                // 游戏总数 (用于前端分页)
}

// ---------------------------------------------------------
// [管理员端] 删除游戏 (可选扩展)
// ---------------------------------------------------------
message DeleteGameReq {
    uint64 game_id = 1;
}

message DeleteGameRsp {
    uint64 deleted_id = 1;
}