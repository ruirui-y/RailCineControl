syntax = "proto3";

package ServerApi;

// =========================================================================================
// 1. 登录与心跳保活业务
// =========================================================================================
message LoginReq {
    string username = 1;                                                        // 厂家后台分配的账号
    string password = 2;                                                        // 登录密码 (建议客户端做个MD5后再传)
}

message LoginRsp {
    int64  server_time = 1;                                                     // 服务器同步时间戳
    string shop_name   = 2;                                                     // 账号绑定的门店名称，用于UI显示
}

message Heartbeat {
    int64 timestamp = 1;                                                        // 客户端当前时间戳
}

// =========================================================================================
// 2. 纯 TCP 大文件分片上传业务 (The Chunk Engine)
// =========================================================================================

// 客户端 -> 服务端：发送视频切片
message UploadChunkReq {
    string file_md5     = 1;                                                    // 整个视频文件的 MD5 (让服务器知道这是哪个文件的切片)
    uint32 chunk_index  = 2;                                                    // 第几个分片 (例如: 0, 1, 2...)
    uint64 chunk_offset = 3;                                                    // 👑 核心：此分片在原文件里的字节偏移量 (解决乱序写入)
    bytes  chunk_data   = 4;                                                    // 真实的二进制流数据 (如 1MB 大小的 mp4 碎片)
    bool   is_last      = 5;                                                    // 标识是否是最后一块
}

// 服务端 -> 客户端：切片接收确认
message UploadChunkRsp {
    string file_md5     = 1;                                                    // 对应的文件 MD5
    uint32 chunk_index  = 2;                                                    // 告诉客户端：第 index 个分片我已经安全落盘
    bool   is_complete  = 3;                                                    // 整个文件是否拼接完成
}

// =========================================================================================
// 3. 影片元数据录入业务 (上传完视频后触发)
// =========================================================================================

// 客户端 -> 服务端：登记影片信息
message UploadMovieReq {
    string movie_name   = 1;                                                    // 影片名称
    string description  = 2;                                                    // 影片玩法说明/简介
    bytes  cover_data   = 3;                                                    // 👑 海报图片的完整二进制流 (直接通过 TCP 传)
    string cover_suffix = 4;                                                    // 海报后缀名 (如 ".jpg", ".png")
    string video_md5    = 5;                                                    // 刚才切片上传的视频 MD5，通知服务器进行数据库绑定
}

// 服务端 -> 客户端：登记成功
message UploadMovieRsp {
    uint64 new_movie_id = 1;                                                    // 服务端成功入库后，返回新分配的影片全局唯一 ID
}

// =========================================================================================
// 4. 影片列表拉取业务
// =========================================================================================

// 影片数据结构 (List复用)
message MovieInfo {
    uint64 movie_id    = 1;                                                     // 影片 ID
    string movie_name  = 2;                                                     // 影片名称
    string cover_url   = 3;                                                     // 云端海报 HTTP 链接 (或者本地相对路径)
    int32  play_status = 4;                                                     // 播放状态：0空闲 1播放中
    string file_md5    = 5;                                                     // 用于底层 TCP 分片下载的唯一标识！
    uint64 file_size   = 6;                                                     // 用于客户端判定本地是否已下载完毕
}

// 客户端 -> 服务端：请求拉取列表
message GetMovieListReq {
    uint32 page_index = 1;                                                      // 分页：当前页码 (默认 1)
    uint32 page_size  = 2;                                                      // 分页：每页数量 (默认 100)
}

// 服务端 -> 客户端：返回列表数据
message GetMovieListRsp {
    repeated MovieInfo movies = 1;                                              // repeated 数组，包含多部影片信息
}

// ===================================================================
// 5. 纯 TCP 分片下载协议
// ===================================================================
// 客户端 -> 服务端：我要抽水！给我第 index 块数据
message DownloadChunkReq {
    string file_md5    = 1;
    uint32 chunk_index = 2;                                                     // 请求的切片序号 (0, 1, 2...)
}

// 服务端 -> 客户端：水来了！这是你要的数据
message DownloadChunkRsp {
    string file_md5    = 1;
    uint32 chunk_index = 2;
    bytes  chunk_data  = 3;                                                     // 视频的二进制数据 (比如 1MB 或 2MB)
    bool   is_last     = 4;                                                     // 是不是最后一块
}

// ===================================================================
// 6. 💡 海报下载协议
// ===================================================================
// 客户端 -> 服务端：给我这张海报！
message DownloadCoverReq {
    string file_md5 = 1;                                                        // 拿视频的 MD5 当钥匙去取海报
}

// 服务端 -> 客户端：海报来了！
message DownloadCoverRsp {
    string file_md5   = 1;
    bytes  cover_data = 2;                                                      // 图片的全部二进制数据
}