syntax = "proto3";

package ServerApi;

// =========================================================================================
// 协议格式: [TotalLen (4字节)] + [HeaderLen (2字节)] + [PacketHeader 字节流] + [Body 字节流]
// =========================================================================================

// =========================================================================================
// 1. 全局路由枚举 (MsgId)
// =========================================================================================
enum MsgId {
    ID_UNKNOWN            = 0;
    
    // ---------------- 心跳与登录 (1000 - 1999) ----------------
    ID_HEARTBEAT          = 1;
    ID_LOGIN_REQ          = 1001;                                               // 登录请求
    ID_LOGIN_RSP          = 1002;                                               // 登录响应
    
    // ---------------- 影片配置业务 (2000 - 2099) ----------------
    ID_UPLOAD_MOVIE_REQ   = 2001;                                               // 影片海报与配置录入请求
    ID_UPLOAD_MOVIE_RSP   = 2002;                                               // 影片海报与配置录入响应
    ID_GET_MOVIE_LIST_REQ = 2003;                                               // 获取影片列表请求
    ID_GET_MOVIE_LIST_RSP = 2004;                                               // 获取影片列表响应
    
    // ---------------- 大文件分片传输业务 (2100 - 2199) ----------------
    ID_UPLOAD_CHUNK_REQ   = 2101;                                               // 发送视频切片请求
    ID_UPLOAD_CHUNK_RSP   = 2102;                                               // 服务器接收切片确认响应
    ID_DOWNLOAD_CHUNK_REQ = 2103;                                               // 客户端请求视频切片
    ID_DOWNLOAD_CHUNK_RSP = 2104;                                               // 服务端返回视频切片
    
    // ---------------- 海报与小文件业务 (2200 - 2299) ----------------
    ID_DOWNLOAD_COVER_REQ = 2201;                                               // 请求海报图片
    ID_DOWNLOAD_COVER_RSP = 2202;                                               // 返回海报图片数据

    // ---------------- 播放记录业务 (3000 - 3099) ----------------
    ID_ADD_RECORD_REQ     = 3001;                                               // 添加记录请求
    ID_ADD_RECORD_RSP     = 3002;                                               // 添加记录响应
    ID_GET_RECORDS_REQ    = 3003;                                               // 查询/获取记录列表请求
    ID_GET_RECORDS_RSP    = 3004;                                               // 查询/获取记录列表响应
    ID_DELETE_RECORD_REQ  = 3005;                                               // 删除记录请求
    ID_DELETE_RECORD_RSP  = 3006;                                               // 删除记录响应
    
    // ---------------- 🎮 游戏库专属业务 (4000 - 4099) ----------------
    ID_UPLOAD_GAME_REQ    = 4001;                                               // 登记新游戏/更新游戏请求
    ID_UPLOAD_GAME_RSP    = 4002;                                               // 登记游戏响应
    ID_GET_GAME_LIST_REQ  = 4003;                                               // 获取游戏列表请求
    ID_GET_GAME_LIST_RSP  = 4004;                                               // 获取游戏列表响应
    ID_DELETE_GAME_REQ    = 4005;                                               // 删除游戏请求
    ID_DELETE_GAME_RSP    = 4006;                                               // 删除游戏响应

    // ---------------- 💰 支付与钱包业务 (5000 - 5099) ----------------
    ID_GET_WALLET_REQ     = 5001;                                               // 获取钱包/积分余额请求
    ID_GET_WALLET_RSP     = 5002;                                               // 获取钱包/积分余额响应
    
    ID_GET_GOODS_REQ      = 5003;                                               // 获取充值套餐列表请求
    ID_GET_GOODS_RSP      = 5004;                                               // 获取充值套餐列表响应
    
    ID_CREATE_ORDER_REQ   = 5005;                                               // 创建支付订单请求 (点击充值按钮)
    ID_CREATE_ORDER_RSP   = 5006;                                               // 创建支付订单响应 (返回支付二维码)
    
    ID_ORDER_NOTIFY_PUSH  = 5007;                                               // 👑 服务端主动推送：支付成功通知 (下发给客户端刷新UI)
    
    ID_CONSUME_POINTS_REQ = 5008;                                               // 消费积分请求 (点击看电影/玩游戏)
    ID_CONSUME_POINTS_RSP = 5009;                                               // 消费积分响应
    
    ID_GET_FLOW_REQ       = 5010;                                               // 获取积分流水记录请求
    ID_GET_FLOW_RSP       = 5011;                                               // 获取积分流水记录响应
}

// =========================================================================================
// 2. 全局状态错误码 (ErrorCode)
// =========================================================================================
enum ErrorCode {
    ERR_SUCCESS         = 0;                                                    // 成功
    
    // ---------------- 登录与鉴权错误 ----------------
    ERR_SERVER_INTERNAL = 1;                                                    // 服务器内部错误
    ERR_WRONG_PWD       = 2;                                                    // 账号不存在或密码错误
    ERR_ACCOUNT_IN_USE  = 3;                                                    // 账号已在其他机器登录 (防多开)
    ERR_ACCOUNT_EXPIRED = 4;                                                    // 账号授权已过期
    
    // ---------------- 影片与文件错误 ----------------
    ERR_MOVIE_EXISTS    = 5;                                                    // 影片已存在 (防重)
    ERR_FILE_IO_FAILED  = 6;                                                    // 服务器本地磁盘读写失败 (分片写入失败时返回)
    ERR_MD5_MISMATCH    = 7;                                                    // 文件损坏或分片MD5校验不一致
    ERR_GAME_EXISTS     = 8;                                                    // 🎮 游戏(或该版本)已存在

    // ---------------- 支付与积分错误 ----------------
    ERR_INSUFFICIENT_POINTS = 9;                                                // 余额/积分不足
    ERR_ORDER_NOT_PAID      = 10;                                               // 订单未支付
    ERR_ORDER_CLOSED        = 11;                                               // 订单已关闭或超时
    ERR_GOODS_OFFLINE       = 12;                                               // 充值商品已下架
}

// =========================================================================================
// 3. 核心通信包头
// =========================================================================================
message PacketHeader {
    MsgId     msg_id     = 1;                                                   // 【核心】消息ID路由
    uint64    seq_id     = 2;                                                   // 【复用】请求序列号 (可用于异步回调匹配)
    ErrorCode error_code = 3;                                                   // 【状态】0为成功，非0为错误
    string    error_msg  = 4;                                                   // 【提示】错误时的具体文本，可直接用于客户端弹窗
}

// =========================================================================================
// 4. 全局传输文件类型枚举 (FileType)
// =========================================================================================
enum FileType {
    FILE_UNKNOWN = 0;
    FILE_MOVIE   = 1;                                                           // 影片相关文件 (视频、海报等)
    FILE_GAME    = 2;                                                           // 游戏相关文件 (tar包、海报等)
}